<!DOCTYPE html>
<html>

<head>
  <title>AI Playlist Generator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🎧 AI Playlist Generator</h1>

<p>Enter a mood or activity</p>

<input id="moodInput" placeholder="ex: late night coding">

<button onclick="generatePlaylist()">
Generate Playlist
</button>

<pre id="playlist"></pre>

</div>

<script src="script.js"></script>

</body>
  
<div id="playlist"></div>

<script>
async function generate() {

  const mood = document.getElementById("mood").value;

  const res = await fetch("/generate-playlist", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ mood })
  });

  const data = await res.json();

  const container = document.getElementById("playlist");
  container.innerHTML = "";

  data.playlist.forEach(song => {

    const link = document.createElement("a");
    link.href = song.youtube;
    link.target = "_blank";
    link.textContent = song.title;

    container.appendChild(link);
    container.appendChild(document.createElement("br"));

  });

}
</script>

  
</html>
